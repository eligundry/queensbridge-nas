services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DATA_DIR}/.caddy/data:/data
      - ${DATA_DIR}/.caddy/config:/config
      - ${DATA_DIR}/.caddy/Caddyfile:/etc/caddy/Caddyfile
      - /var/packages/Tailscale/var:/var/lib/tailscale:ro
      - /var/packages/Tailscale/var:/var/run/tailscale:ro
    environment:
      - TZ=America/New_York
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # PIA VPN gateway. gluetun runs OpenVPN + a kill-switch ENTIRELY inside its own
  # container network namespace — it never touches the host's iptables. This is
  # the fix for the recurring "restarting the torrent client takes the whole NAS
  # offline" problem: the previous image (j4ym0/pia-qbittorrent) ran a kill-switch
  # that, even in Docker bridge mode, clobbered the HOST's iptables (INPUT policy
  # -> DROP) on this Synology and firewalled the box off the network. gluetun's
  # firewall is self-contained, so a VPN drop can only cut off the containers that
  # share this netns (qbittorrent), never the host.
  #
  # qBittorrent's WebUI is published HERE (8888) because qbittorrent joins this
  # container's network namespace via `network_mode: service:gluetun`. Caddy (host
  # networking) reverse-proxies it at localhost:8888. FIREWALL_INPUT_PORTS opens
  # 8888 through gluetun's kill-switch so the WebUI is reachable.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "8888:8888"   # qBittorrent WebUI (qbittorrent shares this netns)
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PIA_USERNAME}
      - OPENVPN_PASSWORD=${PIA_PASSWORD}
      - SERVER_REGIONS=US East
      - FIREWALL_INPUT_PORTS=8888
      - TZ=America/New_York
    # gluetun ships its own healthcheck (pings the internet through the tunnel),
    # so nothing extra is needed here.

  # qBittorrent with NO built-in VPN — it routes all traffic through gluetun's
  # network namespace. If gluetun's tunnel drops, gluetun's kill-switch blocks
  # qBittorrent's traffic without any effect on the host.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=1026
      - PGID=100
      - TZ=America/New_York
      - WEBUI_PORT=8888
    volumes:
      - ${DATA_DIR}:/mnt/nas
      - ${DATA_DIR}/.qbittorrent/config:/config
      - ${DATA_DIR}/Torrents:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888 -o /dev/null || wget -qO /dev/null http://localhost:8888 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
